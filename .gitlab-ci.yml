stages:
  - build
  - test
  - deploy
  - post_deploy

include:
  # Child gitlab-ci.yml file include edilir.
  - local: "ml/preprocessing/segmentation/.gitlab-ci.yml"


deploy_avicenna_pre_proc_seg_app_root:
  # Her bir child gitlab-ci.yml için bir root oluşturulur.
  stage: post_deploy
  script:
    - echo "Deploying AVICENNA Preprocessing Segmentation..."
  needs:
    - deploy_avicenna_pre_proc_seg_app
  rules:
    - if: '$CI_COMMIT_BRANCH == "ml_preprocessing"' # || $CI_COMMIT_BRANCH == "main"
      changes:
        - ml/preprocessing/segmentation/**/*